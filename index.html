<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PE Lab | AI体育互动实验室</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #07141c;
            --card: rgba(10, 32, 41, 0.84);
            --line: rgba(187, 247, 208, 0.16);
            --text: #f8fafc;
            --muted: #b8d2dc;
            --accent: #facc15;
            --accent-2: #34d399;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(52, 211, 153, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(250, 204, 21, 0.18), transparent 30%),
                linear-gradient(135deg, #07141c, #0d2530 58%, #07141c);
            display: grid;
            place-items: center;
            padding: 32px 18px;
        }

        .shell {
            width: min(960px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(52, 211, 153, 0.12);
            color: #bef264;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 12px;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(36px, 6vw, 66px);
            line-height: 0.96;
        }

        p {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            padding: 22px;
            background: rgba(255, 255, 255, 0.04);
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        .card p {
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button.primary {
            background: linear-gradient(135deg, var(--accent), #fb923c);
            color: #111827;
            box-shadow: 0 14px 28px rgba(251, 146, 60, 0.24);
        }

        .button.secondary {
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>
    <main class="shell">
        <span class="eyebrow">AI体育互动实验室</span>
        <h1>AI PE Lab</h1>
        <p>
            这是一个面向浏览器的 AI 体育互动开源实验场，基于 MediaPipe Pose 和 Three.js 构建。
            当前版本聚焦一个已经公开可用的示例：把身体动作映射成奔跑、划船和礁石跳跃三段课堂挑战。
        </p>

        <section class="grid">
            <article class="card">
                <h2>森林大冒险</h2>
                <p>
                    一个面向课堂的姿态互动示例，把森林奔跑、激流划船和礁石跳跃串成一条完整挑战路线。
                </p>
            </article>
            <article class="card">
                <h2>开源可复用</h2>
                <p>
                    仓库已经按模块整理，老师和开发者可以直接修改阈值、场景和界面文案，用在自己的课堂或展示场景里。
                </p>
            </article>
        </section>

        <div class="actions">
            <a class="button primary" href="./examples/three-stage-adventure/">打开示例</a>
            <a class="button secondary" href="./README.md">查看项目介绍</a>
        </div>
    </main>
</body>
</html>
